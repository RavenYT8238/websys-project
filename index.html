<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Raven's Phone Shop</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <h1>📱 Raven's Phone Shop</h1>
    <hr>
    
    <div class="container">
        <div class="products-area">
            <h2>Products</h2>
            <div id="product-parent"></div>
        </div>
        
        <div class="cart-area">
            <h2>Your Cart 🛒 <span id="cart-count">0</span></h2>
            <div id="empty-cart">Cart is empty</div>
            <div id="cart-items"></div>
            <p><strong>Total: ₱<span id="cart-total">0</span></strong></p>
            <button onclick="clearCart()">Clear Cart</button>
            <button onclick="checkout()">Checkout</button>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="cart.js"></script>
    <script src="products.js"></script>
</body>
</html>
